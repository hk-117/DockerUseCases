version: '3.1'

services:

  adminer:
    image: adminer
    container_name: dbadmin
    restart: always
    ports:
      - 8080:8080

  postgres:
    image: postgres
    container_name: postgresdb_dev
    restart: always
    ports:
      - 5432:5432
    volumes:
      - ./database:/var/lib/postgresql/18/docker
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
